<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>On Top – Täglicher Spruch</title>

  <!-- Web App Manifest -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#111111" />

  <!-- Icons für PWA und Website -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

  <!-- Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" />

  <style>
    :root {
      --bg: #111;
      --text: #f5f5f5;
      --muted: #888;
      --accent: #fff;
      --btn-bg: #222;
      --btn-hover: #333;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    #quote {
      font-size: 1.25rem;
      padding: 1rem 1.5rem;
      max-width: 600px;
      line-height: 1.6;
    }

    .btn {
      background-color: var(--btn-bg);
      border: 1px solid var(--accent);
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.2s;
    }

    .btn:hover {
      background-color: var(--btn-hover);
    }

    .info {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('✅ Service Worker registriert'))
          .catch(err => console.error('❌ Service Worker Fehler:', err));
      });
    }
  </script>
</head>

<body>
  <h1>🌟 On Top</h1>
  <div id="quote">Lade Spruch...</div>
  <button class="btn" onclick="requestNotification()">🔔 Erinnerung aktivieren</button>
  <div class="info">Du bekommst täglich einen neuen Spruch. Auch offline.</div>

  <script src="app.js"></script>
</body>
</html>
